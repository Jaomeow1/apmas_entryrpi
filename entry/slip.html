<!DOCTYPE html>
<html lang="th">
<head>
<meta charset="UTF-8">
<title>APMAS Slip Print</title>
<script src="https://www.gstatic.com/firebasejs/10.12.0/firebase-app-compat.js"></script>
<script src="https://www.gstatic.com/firebasejs/10.12.0/firebase-database-compat.js"></script>
<style>
  * { margin:0; padding:0; box-sizing:border-box; }
  body { background:#f0f0f0; font-family: 'Sarabun', 'Noto Sans Thai', sans-serif; }

  .slip {
    width: 300px;
    background: white;
    border-radius: 12px;
    padding: 24px 20px 20px;
    margin: 30px auto;
    box-shadow: 0 4px 20px rgba(0,0,0,.15);
    page-break-after: always;
  }
  .slip-title { text-align:center; font-size:13px; color:#555; margin-bottom:10px; letter-spacing:1px; }
  .qr-wrap { display:flex; justify-content:center; margin-bottom:12px; }
  .qr-wrap img { width:160px; height:160px; border:3px solid #222; border-radius:6px; }
  .org-name { text-align:center; font-size:20px; font-weight:700; letter-spacing:3px; margin-bottom:14px; color:#111; }
  .info-table { width:100%; border-collapse:collapse; margin-bottom:14px; }
  .info-table td { padding:3px 2px; font-size:14px; color:#222; vertical-align:top; }
  .info-table td:first-child { white-space:nowrap; padding-right:6px; }
  .info-table td.val { font-weight:600; }
  .divider { border:none; border-top:1px dashed #bbb; margin:12px 0; }
  .free-parking { text-align:center; font-size:15px; font-weight:700; color:#111; margin-bottom:10px; }
  .note { font-size:12px; color:#444; line-height:1.6; margin-bottom:8px; }
  .contact { font-size:13px; color:#333; margin-top:4px; }
  .loading-slot { color:#aaa; font-style:italic; }

  @media print {
    body { background: white; }
    .slip { box-shadow: none; margin: 0 auto; }
    .no-print { display: none !important; }
  }
</style>
</head>
<body>

<div class="no-print" style="text-align:center; padding:16px;">
  <button onclick="window.print()" style="
    padding:10px 32px; font-size:15px; background:#1a73e8; color:white;
    border:none; border-radius:6px; cursor:pointer;">
    🖨 พิมพ์ Slip
  </button>
  <button onclick="window.close()" style="
    padding:10px 24px; font-size:15px; background:#e53935; color:white;
    border:none; border-radius:6px; cursor:pointer; margin-left:8px;">
    ✕ ปิด
  </button>
</div>

<div class="slip" id="slip-card">
  <div class="slip-title">Scan Here</div>

  <div class="qr-wrap">
    <img id="slip-qr" src="" alt="QR Code">
  </div>

  <div class="org-name">APMAS</div>

  <table class="info-table">
    <tr>
      <td>เลขทะเบียนรถ :</td>
      <td class="val" id="slip-plate">---</td>
    </tr>
    <tr>
      <td>ช่องจอด :</td>
      <td class="val" id="slip-slot"><span class="loading-slot">กำลังโหลด...</span></td>
    </tr>
    <tr>
      <td>วันที่เข้า :</td>
      <td class="val" id="slip-date">---</td>
    </tr>
    <tr>
      <td>เวลาที่เข้า :</td>
      <td class="val" id="slip-time">---</td>
    </tr>
  </table>

  <hr class="divider">

  <div class="free-parking">** จอดฟรี 1 ชม.แรก **</div>

  <div class="note">
    ขอความกรุณาเก็บรักษาบัตรของท่าน
    หากทำบัตรหายจะปรับเป็นจำนวนเงิน 300 บาท
  </div>

  <div class="contact">
    ติดต่อเบอร์โทรศัพท์ : YOUR_CONTACT_PHONE
  </div>
</div>

<script>
// ── CONFIG ── (เติมค่าจริงที่นี่)
const FIREBASE_CONFIG = {
  apiKey:            "YOUR_API_KEY",
  authDomain:        "YOUR_PROJECT_ID.firebaseapp.com",
  databaseURL:       "YOUR_DATABASE_URL",
  projectId:         "YOUR_PROJECT_ID",
  storageBucket:     "YOUR_PROJECT_ID.appspot.com",
  messagingSenderId: "YOUR_MESSAGING_SENDER_ID",
  appId:             "YOUR_APP_ID"
};
const SITE_URL = "YOUR_SITE_URL"; // e.g. https://yourname.github.io/apmas

firebase.initializeApp(FIREBASE_CONFIG);
const db = firebase.database();

// ── รับ params จาก URL ──
const p         = new URLSearchParams(location.search);
const tid       = p.get("ticket_id") || "";
const plate     = p.get("plate")     || "---";
const date      = p.get("date")      || "---";
const time      = p.get("time")      || "---";
const slotParam = p.get("slot")      || "";

document.getElementById("slip-plate").textContent = plate;
document.getElementById("slip-date").textContent  = date;
document.getElementById("slip-time").textContent  = time + " น.";

// แสดง slot จาก URL param ทันที (ไม่ต้องรอ Firebase)
if (slotParam) {
  document.getElementById("slip-slot").textContent = slotParam;
}

// QR — embed slot ลงไปด้วยเพื่อให้ลูกค้าเห็นตำแหน่ง
const qr_link = `${SITE_URL}/?ticket_id=${tid}&slot=${slotParam}`;
document.getElementById("slip-qr").src =
  `https://api.qrserver.com/v1/create-qr-code/?size=200x200&data=${encodeURIComponent(qr_link)}`;

// ── ดึง slot_id จาก Firebase realtime ──
let autoPrinted = false;

if (tid) {
  db.ref(`/tickets/${tid}`).on("value", snap => {
    const t = snap.val();
    if (!t) return;

    const slotId = t.slot_id;
    const slotEl = document.getElementById("slip-slot");

    if (slotId && slotId !== "Not assigned" && slotId !== "") {
      slotEl.textContent    = slotId;
      slotEl.style.fontWeight = "700";
      slotEl.style.color    = "#111";
    } else {
      slotEl.innerHTML = `<span class="loading-slot">กำลังจัดช่อง...</span>`;
    }

    const isReady = (t.status === "verified" || t.status === "parked")
                    && slotId && slotId !== "Not assigned";
    if (p.get("autoprint") === "1" && isReady && !autoPrinted) {
      autoPrinted = true;
      setTimeout(() => window.print(), 900);
    }
  });
} else {
  document.getElementById("slip-slot").textContent = p.get("slot") || "---";
  if (p.get("autoprint") === "1") {
    window.onload = () => setTimeout(() => window.print(), 800);
  }
}
</script>
</body>
</html>
