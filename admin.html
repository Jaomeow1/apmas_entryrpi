<!DOCTYPE html>
<html lang="th">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>APMAS — Admin</title>
<script src="https://www.gstatic.com/firebasejs/10.12.0/firebase-app-compat.js"></script>
<script src="https://www.gstatic.com/firebasejs/10.12.0/firebase-database-compat.js"></script>
<link href="https://fonts.googleapis.com/css2?family=Space+Mono:wght@400;700&family=IBM+Plex+Sans+Thai:wght@300;400;500;600;700&display=swap" rel="stylesheet">
<style>
:root{
  --bg:#080a0d;--surface:#0f1318;--surface2:#151b24;
  --border:#1c2535;--border2:#243044;
  --accent:#00e5a0;--accent-dim:#003d2a;
  --warn:#f5c842;--warn-dim:#2e2500;
  --danger:#ff3d55;--danger-dim:#2d0010;
  --blue:#4d9fff;
  --text:#dde4f0;--muted:#4a5568;--muted2:#2d3748;
}
*{box-sizing:border-box;margin:0;padding:0}
html,body{height:100%;overflow:hidden}
body{background:var(--bg);color:var(--text);
     font-family:'IBM Plex Sans Thai',sans-serif;font-size:14px}

/* HEADER */
#hdr{height:52px;border-bottom:1px solid var(--border);background:var(--surface);
     display:flex;align-items:center;padding:0 0 0 20px;
     position:sticky;top:0;z-index:200;gap:0}
.logo{font-family:'Space Mono',monospace;font-size:16px;font-weight:700;
      color:var(--accent);letter-spacing:3px;margin-right:24px;flex-shrink:0}
.logo small{color:var(--muted);font-size:9px;letter-spacing:1px;
            vertical-align:middle;margin-left:6px}
.nav-tab{height:52px;padding:0 20px;display:flex;align-items:center;gap:8px;
         font-family:'Space Mono',monospace;font-size:10px;letter-spacing:1.5px;
         color:var(--muted);cursor:pointer;border:none;background:none;
         border-bottom:2px solid transparent;transition:all .2s;text-transform:uppercase;
         flex-shrink:0}
.nav-tab svg{width:14px;height:14px;stroke:currentColor;fill:none;
             stroke-width:2;stroke-linecap:round;stroke-linejoin:round}
.nav-tab:hover{color:var(--text)}
.nav-tab.active{color:var(--accent);border-bottom-color:var(--accent)}
.hdr-right{margin-left:auto;display:flex;align-items:center;gap:12px;padding-right:20px}
.live-dot{width:7px;height:7px;border-radius:50%;background:var(--accent);
          box-shadow:0 0 8px var(--accent);animation:blink 2s infinite}
@keyframes blink{0%,100%{opacity:1}50%{opacity:.2}}
#clock{font-family:'Space Mono',monospace;font-size:11px;color:var(--muted)}
.count-chip{font-family:'Space Mono',monospace;font-size:10px;font-weight:700;
            padding:2px 9px;border-radius:4px;
            background:rgba(245,200,66,.15);color:var(--warn);
            border:1px solid rgba(245,200,66,.3)}

/* PAGES */
.page{display:none;height:calc(100vh - 52px);overflow:hidden}
.page.active{display:flex}

/* PAGE 1: VERIFY */
#pv{flex-direction:row}
.q-col{width:380px;min-width:380px;border-right:1px solid var(--border);
       background:var(--surface);display:flex;flex-direction:column;overflow:hidden}
.col-hdr{padding:13px 18px;border-bottom:1px solid var(--border);
         display:flex;align-items:center;justify-content:space-between;
         flex-shrink:0}
.col-title{font-family:'Space Mono',monospace;font-size:9px;
           letter-spacing:2px;color:var(--muted);text-transform:uppercase}
#tlist{overflow-y:auto;flex:1}

.tc{padding:13px 17px;border-bottom:1px solid var(--border);
    cursor:pointer;transition:background .15s;display:flex;gap:11px;align-items:flex-start}
.tc:hover{background:rgba(255,255,255,.02)}
.tc.active{background:rgba(0,229,160,.05);border-left:3px solid var(--accent);padding-left:14px}
.tc-thumb{width:62px;height:40px;border-radius:4px;object-fit:contain;
          flex-shrink:0;border:1px solid var(--border2);background:#050708}
.tc-ph{width:62px;height:40px;border-radius:4px;background:var(--surface2);
       flex-shrink:0;display:flex;align-items:center;justify-content:center;
       font-size:17px;border:1px solid var(--border)}
.tc-body{flex:1;min-width:0}
.tc-plate{font-family:'Space Mono',monospace;font-size:15px;font-weight:700;
          color:var(--text);margin-bottom:4px;
          white-space:nowrap;overflow:hidden;text-overflow:ellipsis}
.tc-meta{display:flex;gap:6px;align-items:center;flex-wrap:wrap}
.tc-id{font-family:'Space Mono',monospace;font-size:9px;color:var(--muted);margin-top:3px}

.badge{display:inline-flex;align-items:center;font-family:'Space Mono',monospace;
       font-size:9px;font-weight:700;padding:2px 7px;border-radius:3px}
.b-pending{background:rgba(245,200,66,.12);color:var(--warn);border:1px solid rgba(245,200,66,.25)}
.b-verified{background:rgba(0,229,160,.1);color:var(--accent);border:1px solid rgba(0,229,160,.2)}
.b-parked{background:rgba(77,159,255,.1);color:var(--blue);border:1px solid rgba(77,159,255,.2)}

.d-col{flex:1;overflow-y:auto;padding:22px 26px;background:var(--bg)}
.empty-st{height:100%;display:flex;flex-direction:column;
          align-items:center;justify-content:center;gap:10px;color:var(--muted)}
.empty-st .ei{font-size:46px;opacity:.18}
.empty-st p{font-family:'Space Mono',monospace;font-size:10px;letter-spacing:1px}

.img-card{border-radius:8px;border:1px solid var(--border);
          overflow:hidden;background:var(--surface);margin-bottom:16px}
.img-card img{width:100%;display:block;height:auto;object-fit:contain;background:#040506}
.img-lbl{padding:6px 11px;font-size:9px;color:var(--muted);
         font-family:'Space Mono',monospace;letter-spacing:1px;
         border-top:1px solid var(--border);text-transform:uppercase}
.img-ph{height:130px;display:flex;align-items:center;
        justify-content:center;font-size:26px;color:var(--muted)}

.info-sec{background:var(--surface);border:1px solid var(--border);
          border-radius:8px;padding:16px;margin-bottom:14px}
.sec-title{font-family:'Space Mono',monospace;font-size:9px;color:var(--muted);
           letter-spacing:2px;text-transform:uppercase;margin-bottom:13px}
.irow{display:flex;justify-content:space-between;align-items:center;
      padding:6px 0;border-bottom:1px solid var(--border)}
.irow:last-child{border-bottom:none}
.ilbl{color:var(--muted);font-size:12px}
.ival{font-family:'Space Mono',monospace;font-size:12px;color:var(--text)}
.ival.plate{font-size:21px;font-weight:700;color:var(--warn);letter-spacing:2px}
.ival.plate-ok{font-size:21px;font-weight:700;color:var(--accent);letter-spacing:2px}
.slot-pill{display:inline-flex;align-items:center;gap:5px;
           font-family:'Space Mono',monospace;font-size:12px;font-weight:700;
           padding:3px 10px;border-radius:5px;
           background:rgba(77,159,255,.1);color:var(--blue);
           border:1px solid rgba(77,159,255,.25)}

.vform{background:var(--surface);border:1px solid var(--border);
       border-radius:8px;padding:16px;margin-bottom:14px}
.fg{margin-bottom:13px}
.fg label{display:block;font-size:9px;color:var(--muted);
          margin-bottom:5px;letter-spacing:1px;text-transform:uppercase}
.fg input{width:100%;padding:11px 12px;background:var(--bg);
          border:1px solid var(--border);border-radius:5px;color:var(--text);
          font-family:'Space Mono',monospace;font-size:18px;
          letter-spacing:3px;font-weight:700;text-transform:uppercase;
          outline:none;transition:border-color .2s}
.fg input:focus{border-color:var(--accent);box-shadow:0 0 0 3px rgba(0,229,160,.07)}
.btn-row{display:flex;gap:9px}
.btn{flex:1;padding:12px;border:none;border-radius:6px;
     font-family:'Space Mono',monospace;font-size:11px;font-weight:700;
     letter-spacing:1px;cursor:pointer;transition:all .2s;text-transform:uppercase}
.btn-ok{background:var(--accent);color:#040506}
.btn-ok:hover{background:#00ffb3;transform:translateY(-1px);
              box-shadow:0 4px 18px rgba(0,229,160,.22)}
.btn-ok:disabled{background:var(--muted);cursor:not-allowed;transform:none;box-shadow:none}
.btn-no{background:transparent;color:var(--danger);border:1px solid rgba(255,61,85,.3)}
.btn-no:hover{background:rgba(255,61,85,.07)}

.qr-sec{background:var(--surface);border:1px solid var(--border);
        border-radius:8px;padding:18px;display:flex;flex-direction:column;
        align-items:center;gap:12px}
.qr-sec img{width:155px;height:155px;border-radius:5px;border:3px solid white}
.qr-url{font-family:'Space Mono',monospace;font-size:9px;color:var(--muted);
        word-break:break-all;text-align:center}
.btn-print{padding:8px 20px;background:transparent;
           border:1px solid var(--warn);color:var(--warn);
           border-radius:5px;font-family:'Space Mono',monospace;
           font-size:10px;cursor:pointer;transition:all .2s;letter-spacing:1px}
.btn-print:hover{background:rgba(245,200,66,.07)}

/* PAGE 2: SLOTS */
#ps{flex-direction:column;overflow-y:auto}
.s-wrap{padding:28px 32px;max-width:900px;width:100%;margin:0 auto}
.pg-title{margin-bottom:22px}
.pg-title h1{font-family:'Space Mono',monospace;font-size:9px;letter-spacing:3px;
             text-transform:uppercase;color:var(--muted);margin-bottom:6px}
.pg-title p{font-size:22px;font-weight:700}
.stats-row{display:flex;gap:9px;margin-top:11px;flex-wrap:wrap}
.sc{font-family:'Space Mono',monospace;font-size:10px;
    padding:3px 11px;border-radius:4px;font-weight:700}
.sc-free{background:rgba(0,229,160,.1);color:var(--accent);border:1px solid rgba(0,229,160,.2)}
.sc-occ{background:rgba(255,61,85,.1);color:var(--danger);border:1px solid rgba(255,61,85,.2)}
.sc-res{background:rgba(245,200,66,.1);color:var(--warn);border:1px solid rgba(245,200,66,.2)}

.sg{display:grid;grid-template-columns:repeat(6,1fr);gap:12px;margin-bottom:24px}
@media(max-width:800px){.sg{grid-template-columns:repeat(3,1fr)}}
@media(max-width:480px){.sg{grid-template-columns:repeat(2,1fr)}}

.scard{border-radius:10px;border:2px solid var(--border);padding:20px 10px;
       text-align:center;cursor:pointer;transition:all .2s;
       background:var(--surface);position:relative;overflow:hidden}
.scard::after{content:'';position:absolute;inset:0;opacity:0;transition:opacity .2s;pointer-events:none}
.scard:hover{transform:translateY(-3px);box-shadow:0 8px 22px rgba(0,0,0,.45)}
.scard.free{border-color:rgba(0,229,160,.3)}
.scard.free::after{background:radial-gradient(ellipse at 50% 0%,rgba(0,229,160,.08),transparent 70%)}
.scard.free:hover{border-color:rgba(0,229,160,.65)}
.scard.free:hover::after,.scard.occupied::after,.scard.reserved::after{opacity:1}
.scard.occupied{border-color:rgba(255,61,85,.35)}
.scard.occupied::after{background:radial-gradient(ellipse at 50% 0%,rgba(255,61,85,.07),transparent 70%)}
.scard.occupied:hover{border-color:rgba(255,61,85,.7)}
.scard.reserved{border-color:rgba(245,200,66,.35)}
.scard.reserved::after{background:radial-gradient(ellipse at 50% 0%,rgba(245,200,66,.07),transparent 70%)}
.scard.reserved:hover{border-color:rgba(245,200,66,.7)}
.scard.sel{outline:2px solid var(--accent);outline-offset:2px;
           box-shadow:0 0 0 4px rgba(0,229,160,.12)!important}
.snum{font-family:'Space Mono',monospace;font-size:28px;font-weight:700;margin-bottom:8px}
.sdot{width:7px;height:7px;border-radius:50%;display:inline-block;margin-right:3px}
.stxt{font-family:'Space Mono',monospace;font-size:9px;letter-spacing:1px;text-transform:uppercase}
.splate{font-family:'Space Mono',monospace;font-size:11px;font-weight:700;
        margin-top:6px;min-height:16px;color:var(--warn)}

.sd{background:var(--surface);border:1px solid var(--border);
    border-radius:10px;padding:20px;max-width:480px;
    animation:fadeUp .2s ease}
@keyframes fadeUp{from{opacity:0;transform:translateY(8px)}to{opacity:1;transform:none}}
.sd-hdr{display:flex;align-items:center;justify-content:space-between;margin-bottom:16px}
.sd-hdr h2{font-family:'Space Mono',monospace;font-size:10px;
           color:var(--muted);letter-spacing:2px;text-transform:uppercase}
.x-btn{background:none;border:none;color:var(--muted);cursor:pointer;
       font-size:16px;transition:color .2s;padding:2px}
.x-btn:hover{color:var(--text)}
.sd-plate{font-family:'Space Mono',monospace;font-size:30px;font-weight:700;
          color:var(--warn);letter-spacing:4px;margin-bottom:14px}
.d2g{display:grid;grid-template-columns:1fr 1fr;gap:9px;margin-bottom:14px}
.di{background:var(--surface2);border-radius:6px;padding:11px 13px}
.di .lbl{font-size:9px;color:var(--muted);margin-bottom:3px;
         text-transform:uppercase;letter-spacing:.5px}
.di .val{font-family:'Space Mono',monospace;font-size:12px;font-weight:600}
.btn-goto{width:100%;padding:10px;
          background:rgba(0,229,160,.07);border:1px solid rgba(0,229,160,.22);
          color:var(--accent);border-radius:6px;
          font-family:'Space Mono',monospace;font-size:10px;font-weight:700;
          cursor:pointer;transition:all .2s;letter-spacing:1px}
.btn-goto:hover{background:rgba(0,229,160,.14)}

#toast{position:fixed;bottom:22px;right:22px;
       background:var(--surface);border:1px solid var(--accent);color:var(--accent);
       padding:12px 17px;border-radius:6px;font-family:'Space Mono',monospace;font-size:11px;
       opacity:0;pointer-events:none;transition:opacity .3s;z-index:999;
       box-shadow:0 4px 22px rgba(0,229,160,.1)}
#toast.show{opacity:1}
::-webkit-scrollbar{width:4px}
::-webkit-scrollbar-thumb{background:var(--border2);border-radius:2px}
</style>
</head>
<body>

<!-- HEADER -->
<div id="hdr">
  <div class="logo">APMAS <small>ADMIN</small></div>

  <button class="nav-tab active" id="tab-v" onclick="go('v')">
    <svg viewBox="0 0 24 24"><path d="M9 11l3 3L22 4"/><path d="M21 12v7a2 2 0 01-2 2H5a2 2 0 01-2-2V5a2 2 0 012-2h11"/></svg>
    ยืนยันรถเข้า
  </button>
  <button class="nav-tab" id="tab-s" onclick="go('s')">
    <svg viewBox="0 0 24 24"><rect x="3" y="3" width="7" height="7" rx="1"/><rect x="14" y="3" width="7" height="7" rx="1"/><rect x="14" y="14" width="7" height="7" rx="1"/><rect x="3" y="14" width="7" height="7" rx="1"/></svg>
    ช่องจอด
  </button>

  <div class="hdr-right">
    <span id="pbadge" class="count-chip" style="display:none">0 รอ</span>
    <span id="clock">--:--:--</span>
    <div class="live-dot"></div>
  </div>
</div>

<!-- PAGE 1: VERIFY -->
<div class="page active" id="pv">
  <div class="q-col">
    <div class="col-hdr">
      <span class="col-title">คิวรถเข้า</span>
      <div style="display:flex;gap:7px;align-items:center">
        <span id="qcount" class="badge b-pending">0 รอ</span>
        <button onclick="toast('↺ รีเฟรช...')" title="รีเฟรช"
          style="background:none;border:none;color:var(--muted);cursor:pointer;font-size:14px">↺</button>
      </div>
    </div>
    <div id="tlist">
      <div style="padding:24px;text-align:center;color:var(--muted);
                  font-family:'Space Mono',monospace;font-size:10px">กำลังโหลด...</div>
    </div>
  </div>

  <div class="d-col" id="dcol">
    <div class="empty-st">
      <div class="ei">🅿</div>
      <p>เลือกรายการจากคิว</p>
    </div>
  </div>
</div>

<!-- PAGE 2: SLOTS -->
<div class="page" id="ps">
  <div class="s-wrap">
    <div class="pg-title">
      <h1>Parking Slots</h1>
      <p>สถานะช่องจอดรถ</p>
      <div class="stats-row">
        <span class="sc sc-free" id="sf">ว่าง 0</span>
        <span class="sc sc-occ"  id="so">ไม่ว่าง 0</span>
        <span class="sc sc-res"  id="sr">จอง 0</span>
      </div>
    </div>
    <div class="sg" id="sgrid"></div>
    <div id="sdwrap"></div>
  </div>
</div>

<div id="toast"></div>

<script>
// ── CONFIG ── (เติมค่าจริงที่นี่)
const FIREBASE_CONFIG = {
  apiKey:            "YOUR_API_KEY",
  authDomain:        "YOUR_PROJECT_ID.firebaseapp.com",
  databaseURL:       "YOUR_DATABASE_URL",
  projectId:         "YOUR_PROJECT_ID",
  storageBucket:     "YOUR_PROJECT_ID.appspot.com",
  messagingSenderId: "YOUR_MESSAGING_SENDER_ID",
  appId:             "YOUR_APP_ID"
};
const API      = "YOUR_API_BASE_URL";  // e.g. http://192.168.x.x:8000
const SITE_URL = "YOUR_SITE_URL";      // e.g. https://yourname.github.io/apmas

firebase.initializeApp(FIREBASE_CONFIG);
const db = firebase.database();

// ── STATE ──
let tickets=[], activeId=null, slots={}, selSlot=null;

// ── CLOCK ──
setInterval(()=>{
  document.getElementById("clock").textContent=
    new Date().toLocaleTimeString("th-TH",{hour12:false});
},1000);

// ── PAGE SWITCH ──
function go(p){
  document.querySelectorAll(".page").forEach(x=>x.classList.remove("active"));
  document.querySelectorAll(".nav-tab").forEach(x=>x.classList.remove("active"));
  document.getElementById("p"+p).classList.add("active");
  document.getElementById("tab-"+p).classList.add("active");
}

// ── FIREBASE: TICKETS ──
db.ref("/tickets").on("value",snap=>{
  const d=snap.val()||{};
  tickets=Object.values(d).sort((a,b)=>(b.time_in||"").localeCompare(a.time_in||""));
  renderList();
  if(activeId){const t=tickets.find(x=>x.ticket_id===activeId);if(t)renderDetail(t)}
  const pend=tickets.filter(t=>t.status==="pending").length;
  const pb=document.getElementById("pbadge");
  pb.textContent=pend+" รอ"; pb.style.display=pend>0?"":"none";
  document.getElementById("qcount").textContent=pend+" รอ";
  document.title=pend>0?`(${pend}) APMAS — Admin`:"APMAS — Admin";
});

// ── FIREBASE: SLOTS ──
db.ref("/slots").on("value",snap=>{
  slots=snap.val()||{};
  renderSlots();
  if(selSlot) renderSD(selSlot);
});

// ── FORMAT ──
function ft(iso){
  if(!iso) return "--";
  try{const d=new Date(iso.replace(" ","T"));
      if(isNaN(d))return iso;
      return d.toLocaleTimeString("th-TH",{hour12:false}).slice(0,5)+" · "+
             d.toLocaleDateString("th-TH",{day:"2-digit",month:"2-digit"})}
  catch(e){return iso}
}
function ftFull(iso){
  if(!iso) return "--";
  try{return new Date(iso.replace(" ","T")).toLocaleString("th-TH")}
  catch(e){return iso}
}

// ── RENDER TICKET LIST ──
function renderList(){
  if(!tickets.length){
    document.getElementById("tlist").innerHTML=
      `<div style="padding:24px;text-align:center;color:var(--muted);
                   font-family:'Space Mono',monospace;font-size:10px">ไม่มีรายการ</div>`;
    return;
  }
  document.getElementById("tlist").innerHTML=tickets.map(t=>{
    const sb=t.status==="pending"
      ?`<span class="badge b-pending">⏳ รอ</span>`
      :t.status==="parked"
      ?`<span class="badge b-parked">🚗 จอด</span>`
      :`<span class="badge b-verified">✓ ยืนยัน</span>`;
    const img=t.image_plate_url
      ?`<img class="tc-thumb" src="${t.image_plate_url}" onerror="this.style.display='none'">`
      :`<div class="tc-ph">📷</div>`;
    const slotTag=t.slot_id&&t.slot_id!=="Not assigned"
      ?`<span style="font-family:'Space Mono',monospace;font-size:9px;padding:1px 6px;
                     border-radius:3px;background:rgba(77,159,255,.1);color:var(--blue)">${t.slot_id}</span>`:"";
    return `<div class="tc${t.ticket_id===activeId?" active":""}" onclick="pick('${t.ticket_id}')">
      ${img}
      <div class="tc-body">
        <div class="tc-plate">${t.plate_text_raw||"--"}</div>
        <div class="tc-meta">${sb}<span style="font-size:10px;color:var(--muted)">${ft(t.time_in)}</span>${slotTag}</div>
        <div class="tc-id">${t.ticket_id}</div>
      </div></div>`;
  }).join("");
}

// ── SELECT TICKET ──
function pick(id){
  activeId=id; renderList();
  const t=tickets.find(x=>x.ticket_id===id);
  if(t) renderDetail(t);
  if(!document.getElementById("pv").classList.contains("active")) go("v");
}

// ── RENDER DETAIL ──
function renderDetail(t){
  const col=document.getElementById("dcol");
  const ver=t.status==="verified"||t.status==="parked";
  const sp=t.slot_id&&t.slot_id!=="Not assigned"
    ?`<span class="slot-pill">🅿 ช่อง&nbsp;${t.slot_id}</span>`
    :`<span style="color:var(--muted)">รอจัดสรร</span>`;

  col.innerHTML=`
    <div class="img-card">
      ${t.image_plate_url
        ?`<img src="${t.image_plate_url}" alt="ป้าย">`
        :`<div class="img-ph">🔢</div>`}
      <div class="img-lbl">ภาพป้ายทะเบียน</div>
    </div>

    <div class="info-sec">
      <div class="sec-title">ข้อมูลตั๋ว</div>
      <div class="irow"><span class="ilbl">Ticket ID</span><span class="ival">${t.ticket_id}</span></div>
      <div class="irow"><span class="ilbl">ป้าย (OCR)</span><span class="ival plate">${t.plate_text_raw||"--"}</span></div>
      ${ver?`<div class="irow"><span class="ilbl">ป้าย (ยืนยัน)</span><span class="ival plate-ok">${t.plate_text_verified||"--"}</span></div>`:""}
      <div class="irow"><span class="ilbl">ช่องจอด</span><span class="ival">${sp}</span></div>
      <div class="irow"><span class="ilbl">เวลาเข้า</span><span class="ival">${ftFull(t.time_in)}</span></div>
      <div class="irow"><span class="ilbl">สถานะ</span>
        <span class="badge ${t.status==="pending"?"b-pending":t.status==="parked"?"b-parked":"b-verified"}">
          ${t.status==="pending"?"⏳ รอตรวจ":t.status==="parked"?"🚗 จอดแล้ว":"✓ ยืนยันแล้ว"}
        </span>
      </div>
    </div>

    ${t.qr_url ? `
    <div class="qr-sec">
      <div class="sec-title">QR Code</div>
      <img src="https://api.qrserver.com/v1/create-qr-code/?size=200x200&data=${
        encodeURIComponent(SITE_URL+"/?ticket_id="+t.ticket_id)
      }" alt="QR">
      <div class="qr-url">${SITE_URL.replace("https://","")}/?ticket_id=${t.ticket_id}</div>
      <button class="btn-print" onclick="slip_('${t.ticket_id}')">🖨 พิมพ์ Slip</button>
    </div>` : `
    <div class="vform">
      <div class="sec-title">แก้ไขป้ายทะเบียน</div>
      <div class="fg">
        <label>ป้ายทะเบียน</label>
        <input id="pi" type="text" value="${t.plate_text_raw||""}"
               placeholder="เช่น กข 1234" oninput="this.value=this.value.toUpperCase()">
      </div>
      <div class="btn-row">
        <button class="btn btn-ok" onclick="confirm_('${t.ticket_id}')">✓ ยืนยัน</button>
      </div>
    </div>`}`;
}

// ── CONFIRM ──
async function confirm_(id){
  const inp=document.getElementById("pi");
  if(!inp?.value.trim()){toast("กรุณากรอกป้ายทะเบียน");return}
  const plate=inp.value.trim();
  const btn=document.querySelector(".btn-ok");
  btn.disabled=true; btn.textContent="กำลังประมวลผล...";
  try{
    const r=await fetch(`${API}/tickets/${id}/verify`,{
      method:"PATCH",headers:{"Content-Type":"application/json"},
      body:JSON.stringify({plate_text_verified:plate})});
    const d=await r.json();

    const local=tickets.find(x=>x.ticket_id===id);
    if(local){
      local.plate_text_verified=plate;
      local.slot_id=d.slot_id||local.slot_id;
      local.status="verified";
      renderDetail(local);
      renderList();
    }

    toast(`✓ ยืนยัน — ช่อง ${d.slot_id||"?"} — เปิดไม้กั้น`);
    setTimeout(()=>slip_(id), 1200);
  }catch(e){
    const qr=`https://api.qrserver.com/v1/create-qr-code/?size=200x200&data=`
      +encodeURIComponent(SITE_URL+"/?ticket_id="+id);
    await db.ref(`/tickets/${id}`).update({plate_text_verified:plate,status:"verified",qr_url:qr});
    toast("✓ ยืนยันแล้ว (offline)");
    setTimeout(()=>slip_(id),1000);
  }
}

// ── REJECT ──
function reject_(id){
  if(!confirm("ยืนยันการปฏิเสธรายการนี้?")) return;
  db.ref(`/tickets/${id}`).remove();
  activeId=null;
  document.getElementById("dcol").innerHTML=
    `<div class="empty-st"><div class="ei">✕</div><p>ปฏิเสธรายการแล้ว</p></div>`;
  toast("✕ ปฏิเสธแล้ว");
}

// ── SLIP ──
function slip_(id){
  const t=tickets.find(x=>x.ticket_id===id); if(!t) return;
  const d=new Date((t.time_in||"").replace(" ","T")),ok=!isNaN(d);
  const slotId = t.slot_id && t.slot_id!=="Not assigned" ? t.slot_id : "";
  const p=new URLSearchParams({
    ticket_id:id,
    plate:t.plate_text_verified||t.plate_text_raw||"",
    slot:slotId,
    date:ok?d.toLocaleDateString("th-TH",{day:"2-digit",month:"2-digit",year:"numeric"}):"--",
    time:ok?d.toLocaleTimeString("th-TH",{hour:"2-digit",minute:"2-digit",hour12:false}):"--",
    autoprint:"1"});
  window.open(`slip.html?${p}`,"_blank","width=380,height=700,menubar=no,toolbar=no");
}

// ── RENDER SLOTS ──
function sortKey(s){const m=s.match(/^([A-Za-z]*)(\d+)$/);return m?m[1]+m[2].padStart(4,"0"):s}

function renderSlots(){
  const sorted=Object.entries(slots).sort((a,b)=>sortKey(a[0]).localeCompare(sortKey(b[0])));
  let fr=0,oc=0,re=0;
  sorted.forEach(([,v])=>{
    if(v.status==="free")fr++;
    else if(v.status==="occupied")oc++;
    else re++;
  });
  document.getElementById("sf").textContent=`ว่าง ${fr}`;
  document.getElementById("so").textContent=`ไม่ว่าง ${oc}`;
  document.getElementById("sr").textContent=`จอง ${re}`;

  if(!sorted.length){
    document.getElementById("sgrid").innerHTML=
      `<div style="grid-column:1/-1;text-align:center;padding:40px;
                   color:var(--muted);font-family:'Space Mono',monospace;font-size:10px">
        ยังไม่มีช่องจอด<br>POST /api/slots/init</div>`;
    return;
  }

  document.getElementById("sgrid").innerHTML=sorted.map(([sid,sv])=>{
    const st=sv.status||"free";
    const dc=st==="free"?"#00e5a0":st==="reserved"?"#f5c842":"#ff3d55";
    const tx=st==="free"?"FREE":st==="reserved"?"RESERV":"OCCUP";
    return `<div class="scard ${st}${selSlot===sid?" sel":""}" onclick="clickSlot('${sid}')">
      <div class="snum">${sid}</div>
      <div><span class="sdot" style="background:${dc};box-shadow:0 0 5px ${dc}"></span>
           <span class="stxt" style="color:${dc}">${tx}</span></div>
      <div class="splate">${sv.plate||""}</div>
    </div>`;
  }).join("");
}

function clickSlot(sid){
  selSlot=selSlot===sid?null:sid;
  renderSlots();
  if(selSlot) renderSD(selSlot);
  else document.getElementById("sdwrap").innerHTML="";
}

function renderSD(sid){
  const sv=slots[sid]||{};
  const st=sv.status||"free";
  const tid=sv.ticket_id||"";
  const t=tickets.find(x=>x.ticket_id===tid);
  const dc=st==="free"?"#00e5a0":st==="reserved"?"#f5c842":"#ff3d55";
  const th=st==="free"?"ว่าง":st==="reserved"?"จองแล้ว":"ไม่ว่าง";

  document.getElementById("sdwrap").innerHTML=`
    <div class="sd">
      <div class="sd-hdr">
        <h2>SLOT DETAIL — ${sid}</h2>
        <button class="x-btn" onclick="clickSlot('${sid}')">✕</button>
      </div>
      ${sv.plate?`<div class="sd-plate">${sv.plate}</div>`
                :`<div style="font-family:'Space Mono',monospace;font-size:13px;
                              color:var(--muted);margin-bottom:14px">ไม่มีรถจอด</div>`}
      <div class="d2g">
        <div class="di">
          <div class="lbl">สถานะ</div>
          <div class="val" style="color:${dc}">${th}</div>
        </div>
        <div class="di">
          <div class="lbl">Ticket ID</div>
          <div class="val" style="font-size:9px">${tid||"--"}</div>
        </div>
        <div class="di" style="grid-column:1/-1">
          <div class="lbl">เวลาเข้าช่อง</div>
          <div class="val">${ftFull(sv.time_in)}</div>
        </div>
        ${t?`<div class="di" style="grid-column:1/-1">
          <div class="lbl">ป้ายทะเบียน (ยืนยัน)</div>
          <div class="val" style="color:var(--accent)">${t.plate_text_verified||t.plate_text_raw||"--"}</div>
        </div>`:""}
      </div>
      ${tid?`<button class="btn-goto" onclick="pick('${tid}')">ดูรายละเอียด Ticket →</button>`:""}
    </div>`;
}

// ── TOAST ──
function toast(m){
  const el=document.getElementById("toast");
  el.textContent=m; el.classList.add("show");
  setTimeout(()=>el.classList.remove("show"),3000);
}
</script>
</body>
</html>
